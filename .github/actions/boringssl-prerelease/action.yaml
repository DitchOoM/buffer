name: "Stage boringssl-kmp prerelease"
description: >-
  Stages the boringssl-kmp v0.0.1-rc.1 PRERELEASE so buffer's unconditionally-applied
  com.ditchoom.boringssl.provision plugin resolves in CI. The plugin + BOM are not yet on the
  Plugin Portal / Maven Central, so every Gradle-invoking job would otherwise fail at configuration
  time (the plugin is applied in buffer-crypto/build.gradle.kts regardless of target). This action
  unzips the release's maven-local-staging.zip into ~/.m2/repository (pluginManagement's mavenLocal
  then resolves com.ditchoom.boringssl.provision + boringssl-bom at 0.0.1-rc.1). With `bundle: true`
  it also downloads the linuxX64/linuxArm64 tarballs (+ their .sha256 sidecars) into
  $RUNNER_TEMP/bssl, which -PboringsslLocalBundle points at for the jobs that actually execute the
  Linux native cinterop (build-linux, osv-scanner). REMOVE this action + its callers once the plugin
  ships to the Plugin Portal and a stable Release exists (see the settings.gradle.kts mavenLocal note).
inputs:
  bundle:
    description: >-
      "true" also stages the linuxX64/linuxArm64 bundle tarballs into $RUNNER_TEMP/bssl for jobs that
      run the Linux native build/test (the ones registering + executing linuxX64/linuxArm64). Leave
      "false" for plugin-only jobs (Apple/Android/JVM/detekt/docs/CodeQL) that apply the plugin but
      never hit the Linux cinterop.
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Stage boringssl-kmp prerelease plugin + BOM into mavenLocal
      shell: bash
      env:
        BORINGSSL_REL: "https://github.com/DitchOoM/boringssl-kmp/releases/download/v0.0.1-rc.1"
      run: |
        set -euo pipefail
        mkdir -p ~/.m2/repository
        curl -fsSL "$BORINGSSL_REL/maven-local-staging.zip" -o /tmp/mls.zip
        unzip -o -q /tmp/mls.zip -d ~/.m2/repository
        echo "Staged boringssl-kmp 0.0.1-rc.1 plugin + BOM into ~/.m2/repository"

    - name: Stage boringssl-kmp prerelease Linux bundle tarballs
      if: inputs.bundle == 'true'
      shell: bash
      env:
        BORINGSSL_REL: "https://github.com/DitchOoM/boringssl-kmp/releases/download/v0.0.1-rc.1"
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/bssl"
        cd "$RUNNER_TEMP/bssl"
        # localDist sidecar-checksum path: the plugin verifies each tarball against its sibling
        # <tar>.sha256, so fetch both. Names must be boringssl-<bundleVersion>-<triple>.tar.gz.
        for triple in linuxX64 linuxArm64; do
          curl -fsSL -O "$BORINGSSL_REL/boringssl-0.0.1-rc.1-${triple}.tar.gz"
          curl -fsSL -O "$BORINGSSL_REL/boringssl-0.0.1-rc.1-${triple}.tar.gz.sha256"
        done
        echo "Staged Linux bundle tarballs into $RUNNER_TEMP/bssl"

    - name: Export Gradle -P coordinates as $BORINGSSL_ARGS
      shell: bash
      run: |
        set -euo pipefail
        # Every Gradle call in the job appends "$BORINGSSL_ARGS". Plugin resolution is always needed
        # (the provision plugin is applied unconditionally); -PboringsslBundleVersion / -PboringsslLocalBundle
        # are added only for bundle jobs so the plugin's localDist path finds the staged tarballs.
        ARGS="-PboringsslPluginVersion=0.0.1-rc.1"
        if [ "${{ inputs.bundle }}" = "true" ]; then
          ARGS="$ARGS -PboringsslBundleVersion=0.0.1-rc.1 -PboringsslLocalBundle=$RUNNER_TEMP/bssl"
        fi
        echo "BORINGSSL_ARGS=$ARGS" >> "$GITHUB_ENV"
        echo "BORINGSSL_ARGS=$ARGS"
