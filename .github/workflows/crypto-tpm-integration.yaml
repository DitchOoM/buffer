name: "TPM2 Integration Test (swtpm)"

# Deterministic hardware-free verification of the tpm2-pkcs11-backed JVM key provider:
# a software TPM (swtpm) + tpm2-abrmd resource broker + an initialized tpm2-pkcs11 token
# reproduce the exact stack a real Linux TPM 2.0 deployment exercises (where the kernel's
# /dev/tpmrm0 plays the broker role). The test run is REQUIRED mode: the provider must
# resolve Available and pass the full sign/agreement contract, so a regression can never
# hide behind a silent capability refusal.

on:
  pull_request:
    paths:
      - 'buffer-crypto/**'
      - '.github/workflows/crypto-tpm-integration.yaml'

permissions:
  contents: read

jobs:
  swtpm:
    name: "JVM provider against swtpm token"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Install swtpm + tpm2-pkcs11 stack
        run: |
          sudo apt-get update
          sudo apt-get install -y swtpm swtpm-tools tpm2-tools tpm2-abrmd \
            libtpm2-pkcs11-1 libtpm2-pkcs11-tools libtss2-tcti-tabrmd0 dbus

      - name: Start swtpm, session D-Bus, and tpm2-abrmd; initialize the PKCS#11 token
        run: |
          RIG="$RUNNER_TEMP/tpm-rig"
          mkdir -p "$RIG/tpmstate" "$RIG/pkcs11store"
          swtpm socket --tpm2 --tpmstate dir="$RIG/tpmstate" \
            --server type=tcp,port=2321 --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --daemon
          dbus-daemon --session --address="unix:path=$RIG/dbus.sock" --fork
          export DBUS_SESSION_BUS_ADDRESS="unix:path=$RIG/dbus.sock"
          tpm2-abrmd --tcti=swtpm:host=127.0.0.1,port=2321 --session &
          sleep 2
          export TPM2TOOLS_TCTI="tabrmd:bus_type=session"
          export TPM2_PKCS11_TCTI="tabrmd:bus_type=session"
          export TPM2_PKCS11_STORE="$RIG/pkcs11store"
          tpm2_getcap properties-fixed | head -2
          tpm2_ptool init --path "$TPM2_PKCS11_STORE"
          tpm2_ptool addtoken --pid 1 --label buffer-crypto \
            --userpin 1234 --sopin 5678 --path "$TPM2_PKCS11_STORE"
          # Expose the rig to the test step (fresh Gradle daemon there inherits this env).
          {
            echo "DBUS_SESSION_BUS_ADDRESS=unix:path=$RIG/dbus.sock"
            echo "TPM2_PKCS11_TCTI=tabrmd:bus_type=session"
            echo "TPM2_PKCS11_STORE=$RIG/pkcs11store"
          } >> "$GITHUB_ENV"

      - name: Run TPM-required JVM tests
        run: |
          ./gradlew :buffer-crypto:jvmTest \
            --tests "com.ditchoom.buffer.crypto.Tpm2Pkcs11ProviderTest" \
            --tests "com.ditchoom.buffer.crypto.Tpm2Pkcs11KeyStoreTest" \
            --tests "com.ditchoom.buffer.crypto.ProtectedKeyResolutionTest" \
            -P"buffer.crypto.tpm2.pkcs11.module=/usr/lib/x86_64-linux-gnu/libtpm2_pkcs11.so.1" \
            -P"buffer.crypto.tpm2.pkcs11.pin=1234" \
            -P"buffer.crypto.require.tpm2=true"

      - name: Run TPM-required Kotlin/Native Linux tests
        run: |
          # The native backend reads its configuration from the environment; stop the daemon first
          # so the test task's env forwarding sees these values (daemon env is frozen at launch).
          ./gradlew --stop
          export BUFFER_CRYPTO_TPM2_PKCS11_MODULE=/usr/lib/x86_64-linux-gnu/libtpm2_pkcs11.so.1
          export BUFFER_CRYPTO_TPM2_PKCS11_PIN=1234
          export BUFFER_CRYPTO_REQUIRE_TPM2=true
          ./gradlew :buffer-crypto:linuxX64Test \
            --tests "com.ditchoom.buffer.crypto.Tpm2Pkcs11NativeProviderTest" \
            --tests "com.ditchoom.buffer.crypto.ProtectedKeyResolutionTest"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tpm2-jvm-test-results
          path: |
            buffer-crypto/build/reports/tests/jvmTest/
            buffer-crypto/build/reports/tests/linuxX64Test/
          if-no-files-found: ignore

  # tpm2-pkcs11 1.9 lacks CKM_ECDH1_DERIVE, so the swtpm job can only pin agreement's honest
  # refusal. SoftHSM is a derive-capable PKCS#11 module, so this job proves the dormant agreement
  # path - eligibility probe, ephemeral ECDH, and cert-wrapped persistent agreement aliases - through
  # the exact same SunPKCS11 bridge a future tpm2-pkcs11 release will light up.
  softhsm:
    name: "JVM key store against SoftHSM (agreement contract)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Install and initialize SoftHSM
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2
          RIG="$RUNNER_TEMP/softhsm"
          mkdir -p "$RIG/tokens"
          printf 'directories.tokendir = %s\nobjectstore.backend = file\n' "$RIG/tokens" \
            > "$RIG/softhsm2.conf"
          export SOFTHSM2_CONF="$RIG/softhsm2.conf"
          softhsm2-util --init-token --slot 0 --label buffer-crypto --pin 1234 --so-pin 5678
          echo "SOFTHSM2_CONF=$RIG/softhsm2.conf" >> "$GITHUB_ENV"

      - name: Run agreement-required JVM tests
        run: |
          ./gradlew :buffer-crypto:jvmTest \
            --tests "com.ditchoom.buffer.crypto.Tpm2Pkcs11KeyStoreTest" \
            -P"buffer.crypto.tpm2.pkcs11.module=/usr/lib/softhsm/libsofthsm2.so" \
            -P"buffer.crypto.tpm2.pkcs11.pin=1234" \
            -P"buffer.crypto.require.p11.agreement=true"

      - name: Run agreement-required Kotlin/Native Linux tests
        run: |
          ./gradlew --stop
          export BUFFER_CRYPTO_TPM2_PKCS11_MODULE=/usr/lib/softhsm/libsofthsm2.so
          export BUFFER_CRYPTO_TPM2_PKCS11_PIN=1234
          export BUFFER_CRYPTO_REQUIRE_P11_AGREEMENT=true
          ./gradlew :buffer-crypto:linuxX64Test \
            --tests "com.ditchoom.buffer.crypto.Tpm2Pkcs11NativeProviderTest"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: softhsm-jvm-test-results
          path: |
            buffer-crypto/build/reports/tests/jvmTest/
            buffer-crypto/build/reports/tests/linuxX64Test/
          if-no-files-found: ignore
