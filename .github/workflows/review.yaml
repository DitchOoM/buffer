name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
    types:
      - synchronize
      - opened

permissions:
  contents: read

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  docs:
    name: "Validate Docs Generation"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - name: Generate API Documentation with Dokka
        run: ./gradlew copyDokkaToDocusaurus
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs site
        working-directory: docs
        run: npm run build
