name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
    types:
      - synchronize
      - opened

permissions:
  contents: read

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  docs:
    name: "Validate Docs Generation"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      # buffer-crypto applies com.ditchoom.boringssl.provision unconditionally, so copyDokkaToDocusaurus
      # fails at configuration time until the plugin resolves. Dokka never executes the Linux native
      # cinterop (and this job runs on macOS, where only Apple targets register), so stage the plugin +
      # BOM only (no bundle). Remove once the plugin is on the Plugin Portal.
      - name: Stage boringssl-kmp prerelease (plugin only)
        uses: ./.github/actions/boringssl-prerelease
      - name: Generate API Documentation with Dokka
        run: ./gradlew copyDokkaToDocusaurus $BORINGSSL_ARGS
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs site
        working-directory: docs
        run: npm run build
