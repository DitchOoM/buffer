name: "Build Test and Deploy"
on:
  pull_request_target:
    branches: [ main ]
    types:
      - closed
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      flow:
        description: "Release flow"
        type: choice
        options:
          - release
          - draft
          - dry-run
        default: release

# Least privilege: this workflow runs on pull_request_target (merged PRs), so the default
# token is read-only and write is granted per-job only where actually needed (tag/release).
permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check-release:
    name: Check if release is needed
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # lists the merged PR's changed files via the REST API
    outputs:
      flow: ${{ steps.check.outputs.flow }}
      gradle-args: ${{ steps.check.outputs.gradle-args }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Determine release flow
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Manual dispatch has no PR to inspect — take flow and version
          # bump straight from the workflow inputs.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.version-bump }}" in
              major) echo "gradle-args=-PincrementMajor=true" >> $GITHUB_OUTPUT ;;
              minor) echo "gradle-args=-PincrementMinor=true" >> $GITHUB_OUTPUT ;;
              *)     echo "gradle-args=" >> $GITHUB_OUTPUT ;;
            esac
            echo "flow=${{ inputs.flow }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          gradle_args=""
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            gradle_args="-PincrementMajor=true"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            gradle_args="-PincrementMinor=true"
          fi
          echo "gradle-args=${gradle_args}" >> $GITHUB_OUTPUT

          # Check for skip-release label
          if ${{ contains(github.event.pull_request.labels.*.name, 'skip-release') }}; then
            echo "flow=dry-run" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for draft-release label
          if ${{ contains(github.event.pull_request.labels.*.name, 'draft-release') }}; then
            echo "flow=draft" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if only non-code files changed.
          # Use the paginated "list PR files" API rather than `gh pr diff`: the
          # latter hits the .diff endpoint, which GitHub caps at 300 files and
          # returns HTTP 406 for larger PRs.
          # The PR-files API returns objects with a `filename` field, not `path`.
          # The earlier `gh pr diff --name-only` shortcut emitted bare filenames;
          # switching to the API silently broke the loop when this used `.path`.
          changed_files=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename')
          for file in $changed_files; do
            case "$file" in
              .github/*|*.md|.gitignore|.editorconfig|CLAUDE.md|LICENSE|*.txt)
                ;;
              *)
                echo "Code file changed: $file"
                echo "flow=release" >> $GITHUB_OUTPUT
                exit 0
                ;;
            esac
          done

          echo "Only non-code files changed, skipping"
          echo "flow=skip" >> $GITHUB_OUTPUT

  build-linux:
    needs: check-release
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/build-linux.yaml
    with:
      gradle-args: ${{ needs.check-release.outputs.gradle-args }}
      # For an actual release/draft publish-to-Central, force a clean, cache-free rebuild
      # of the published artifacts. Non-publishing flows (dry-run) reuse the build cache.
      clean-publish: ${{ needs.check-release.outputs.flow == 'release' || needs.check-release.outputs.flow == 'draft' }}

  build-apple:
    needs: check-release
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/build-apple.yaml
    with:
      gradle-args: ${{ needs.check-release.outputs.gradle-args }}
      # For an actual release/draft publish-to-Central, force a clean, cache-free rebuild
      # of the published artifacts. Non-publishing flows (dry-run) reuse the build cache.
      clean-publish: ${{ needs.check-release.outputs.flow == 'release' || needs.check-release.outputs.flow == 'draft' }}

  validate:
    needs: [check-release, build-linux, build-apple]
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  publish:
    needs: [check-release, validate]
    if: needs.check-release.outputs.flow == 'draft' || needs.check-release.outputs.flow == 'release'
    uses: ./.github/workflows/publish-to-central.yaml
    with:
      publishing-type: ${{ needs.check-release.outputs.flow == 'draft' && 'USER_MANAGED' || 'AUTOMATIC' }}
      version: ${{ needs.build-linux.outputs.version }}
    secrets:
      GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

  finalize:
    name: Finalize Release
    needs: [check-release, build-linux, publish]
    if: always() && needs.check-release.outputs.flow != 'skip' && needs.check-release.outputs.flow != 'dry-run'
    runs-on: ubuntu-latest
    permissions:
      contents: write # pushes the version tag and creates the GitHub release
      id-token: write # OIDC for SLSA build-provenance attestation
      attestations: write # write provenance + SBOM attestations to the GitHub attestation store
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create draft GitHub release
        if: needs.check-release.outputs.flow == 'draft' && needs.publish.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}', github.server_url, github.repository) }}
        run: |
          version="${{ needs.build-linux.outputs.version }}"
          deployment_id="${{ needs.publish.outputs.deployment-id }}"
          staging_url="https://central.sonatype.com/publishing/deployments"

          gh release create "v${version}" \
              --draft \
              --repo="$GITHUB_REPOSITORY" \
              --title="v${version}" \
              --notes="$(cat <<EOF
          ## [${PR_TITLE}](${PR_URL})

          **Status:** Awaiting validation in [Maven Central Staging](${staging_url})
          **Deployment ID:** \`${deployment_id}\`

          ### To complete release:
          1. Validate artifacts in Maven Central staging area
          2. Run the 'Complete or Cancel Release' workflow with action 'complete' and version '${version}'

          ### To cancel:
          1. Run the 'Complete or Cancel Release' workflow with action 'cancel' and version '${version}'
          2. This will drop the deployment and delete this draft release
          EOF
          )"

      - name: Create tag and GitHub release
        if: needs.check-release.outputs.flow == 'release' && needs.publish.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}', github.server_url, github.repository) }}
        run: |
          version="${{ needs.build-linux.outputs.version }}"
          tag="v${version}"

          # Check if tag already exists
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            exit 0
          fi

          # Create and push tag
          git tag "$tag"
          git push origin "$tag"

          # Create release
          maven_url="https://central.sonatype.com/artifact/com.ditchoom/buffer/${version}"
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${tag}" \
              --notes="$(cat <<EOF
          ## [${PR_TITLE}](${PR_URL})

          **Maven Central:** [com.ditchoom:buffer:${version}](${maven_url})
          EOF
          )"

      # ---- Supply-chain: SBOM + SLSA build provenance for the published artifacts ----
      # Runs whenever publish succeeded (draft or release). Uses the exact same artifact
      # bundle the publish job uploaded to Maven Central, so the attested digests match
      # what consumers download.
      - name: Download published artifacts
        if: needs.publish.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: maven-local-merged
          path: /tmp/maven-repo

      - name: Generate SBOM (CycloneDX)
        if: needs.publish.result == 'success'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: /tmp/maven-repo
          format: cyclonedx-json
          output-file: /tmp/buffer-sbom.cdx.json
          artifact-name: buffer-sbom.cdx.json

      - name: Attest build provenance
        if: needs.publish.result == 'success'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # The shipped binaries: JVM/Android jars+aars and Kotlin/Native klibs.
          subject-path: |
            /tmp/maven-repo/**/*.jar
            /tmp/maven-repo/**/*.klib
            /tmp/maven-repo/**/*.aar

      - name: Attest SBOM
        if: needs.publish.result == 'success'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: |
            /tmp/maven-repo/**/*.jar
            /tmp/maven-repo/**/*.klib
            /tmp/maven-repo/**/*.aar
          sbom-path: /tmp/buffer-sbom.cdx.json

      - name: Attach SBOM to release
        if: needs.check-release.outputs.flow == 'release' && needs.publish.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.build-linux.outputs.version }}"
          gh release upload "v${version}" /tmp/buffer-sbom.cdx.json \
            --repo="$GITHUB_REPOSITORY" --clobber
