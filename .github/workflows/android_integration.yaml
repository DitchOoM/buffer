name: "Android Emulator Integration Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Force-kill emulator after 1 second instead of waiting 20 seconds for graceful shutdown
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
    strategy:
      fail-fast: false
      matrix:
        # API 21 + 35 cover every distinct java.util.zip code path the compression module
        # takes (verified against the SDK's api-versions.xml):
        #   21  -> array deflate/inflate + array CRC32 (ByteBuffer overloads are since=35,
        #          CRC32.update(ByteBuffer) since=26); also the worst-case old ART that
        #          exposed the NO_FLUSH drain bug, so it guards the 3-arg-deflate fix.
        #   35  -> ByteBuffer fast path for deflate/inflate/setInput + CRC32 (all since=35).
        # A mid level (e.g. 29) only re-tests the combination of branches already covered
        # by 21 and 35 independently, so it is omitted as redundant.
        # (AGP 9 made KMP commonTest actually run on the emulator; AGP 8 ran 0 of them.)
        # target/arch are explicit: API 35 has no 32-bit/`default` image (google_apis;x86_64
        # only), and the action otherwise defaults to the nonexistent default;x86.
        include:
          - api-level: 21
            target: default
            arch: x86_64
          - api-level: 35
            target: google_apis
            arch: x86_64
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pin Android debug keystore
        # The runner otherwise auto-generates a fresh ~/.android/debug.keystore per
        # run. Combined with the cached AVD (whose userdata retains a previously
        # installed, differently-signed test APK), a cache hit then fails to install
        # with INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES before any test runs.
        # Pinning a committed debug key makes the APK signature deterministic, so a
        # stale cached install always matches and the install is idempotent.
        run: |
          mkdir -p ~/.android
          cp .ci/debug.keystore ~/.android/debug.keystore

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedAndroidTest -x connectedBenchmarkAndroidTest

      - name: Kill emulator processes
        if: always()
        run: |
          pkill -SIGTERM crashpad_handler || true
          sleep 2
          pkill -SIGKILL crashpad_handler || true
          adb emu kill || true