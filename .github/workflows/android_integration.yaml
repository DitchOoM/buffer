name: "Android Emulator Integration Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Force-kill emulator after 1 second instead of waiting 20 seconds for graceful shutdown
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
    strategy:
      fail-fast: false
      matrix:
        # API 21 + 35 cover every distinct java.util.zip code path the compression module
        # takes (verified against the SDK's api-versions.xml):
        #   21  -> array deflate/inflate + array CRC32 (ByteBuffer overloads are since=35,
        #          CRC32.update(ByteBuffer) since=26); also the worst-case old ART that
        #          exposed the NO_FLUSH drain bug, so it guards the 3-arg-deflate fix.
        #   35  -> ByteBuffer fast path for deflate/inflate/setInput + CRC32 (all since=35).
        # A mid level (e.g. 29) only re-tests the combination of branches already covered
        # by 21 and 35 independently, so it is omitted as redundant.
        # (AGP 9 made KMP commonTest actually run on the emulator; AGP 8 ran 0 of them.)
        # target/arch are explicit: API 35 has no 32-bit/`default` image (google_apis;x86_64
        # only), and the action otherwise defaults to the nonexistent default;x86.
        include:
          - api-level: 21
            target: default
            arch: x86_64
          - api-level: 35
            target: google_apis
            arch: x86_64
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pin Android debug keystore
        # The runner otherwise auto-generates a fresh ~/.android/debug.keystore per
        # run. Combined with the cached AVD (whose userdata retains a previously
        # installed, differently-signed test APK), a cache hit then fails to install
        # with INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES before any test runs.
        # Pinning a committed debug key makes the APK signature deterministic, so a
        # stale cached install always matches and the install is idempotent.
        run: |
          mkdir -p ~/.android
          cp .ci/debug.keystore ~/.android/debug.keystore

      # restore/save are deliberately SPLIT (not actions/cache@v5): the unified
      # action saves at job END, i.e. AFTER `run tests` — capturing AVD userdata
      # with the test APKs installed, possibly torn from the emulator teardown
      # mid-write. Every cache-miss run then poisons the cache for the next run:
      # the stale/corrupt install can neither be uninstalled
      # (DELETE_FAILED_INTERNAL_ERROR on API 21) nor reinstalled over
      # (INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES), even with the pinned
      # keystore. Saving explicitly right after the create-AVD step caches the
      # PRISTINE AVD disk — no package ever installed — and the post-test state
      # is never cached.
      #
      # The cached AVD is deliberately SNAPSHOT-FREE: the create step runs with
      # `-no-snapshot` so no quickboot snapshot is ever written, and `run tests`
      # COLD-BOOTS (also `-no-snapshot`). Restoring a cached quickboot snapshot
      # is hang-prone — a snapshot saved on one GitHub runner host and reloaded
      # on another intermittently deadlocks the emulator ("A snapshot operation
      # for 'test' is pending and timeout has expired"), which never recovers and
      # trips the boot timeout. A cold boot from the cached AVD disk takes
      # ~30-60s, far under the runner-action boot timeout, and is reproducible
      # across hosts. We still cache ~/.android/avd/* so the AVD disk itself is
      # reused (skips re-creation); only the fragile snapshot is dropped.
      - name: AVD cache (restore)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # The keystore hash stays in the key so a keystore change still
          # invalidates any cache created under the old key (see #183).
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}-${{ hashFiles('.ci/debug.keystore') }}

      - name: create AVD for caching (no snapshot)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          # -no-snapshot: create + cold-boot the AVD without writing any
          # quickboot snapshot, so the cached AVD disk is snapshot-free.
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Primed pristine AVD disk for caching."

      - name: AVD cache (save pristine AVD)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}-${{ hashFiles('.ci/debug.keystore') }}

      - name: run tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          # -no-snapshot (== -no-snapshot-load + -no-snapshot-save): COLD-BOOT
          # from the cached AVD disk. Never restores a quickboot snapshot, which
          # is hang-prone when saved on one runner host and reloaded on another
          # (see the rationale on the AVD cache steps above).
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # The cached AVD's userdata retains test APKs installed by the run
            # that populated it. If any was signed with a different debug key
            # than the current build (cache poisoning across a keystore /
            # emulator / module-signing change — the keystore-hash cache key in
            # #183 only invalidates on keystore changes, not these), reinstalling
            # over it fails with INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES
            # before any test runs. Uninstalling every pre-existing ditchoom
            # package first makes the install clean and idempotent regardless of
            # what signature the cached copy carried.
            adb shell pm list packages -3 | sed 's/^package://' | grep -i '\.ditchoom\.' | xargs -r -n1 adb uninstall || true
            # connectedAndroidTestCompatible (root build.gradle.kts) schedules only the
            # connected tests for modules whose minSdk <= this emulator's API level.
            # AGP fails connectedAndroidTest for a module whose minSdk exceeds the device
            # API ("No compatible devices connected.[TestRunner] FAILED") instead of
            # skipping it, which red-failed the API-21 leg the moment a higher-minSdk
            # module (e.g. buffer-crypto, minSdk 28) was present. Passing the matrix
            # api-level lets the build drop those modules cleanly on the low-API leg.
            ./gradlew connectedAndroidTestCompatible -PdeviceApiLevel=${{ matrix.api-level }}

      - name: Kill emulator processes
        if: always()
        run: |
          pkill -SIGTERM crashpad_handler || true
          sleep 2
          pkill -SIGKILL crashpad_handler || true
          adb emu kill || true