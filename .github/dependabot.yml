# Dependabot keeps GitHub Actions and the independently-versioned Gradle
# libraries current. The tightly-coupled toolchain bumps that must move
# together and need a build to validate them — Kotlin, KSP, kotlin-wrappers,
# AGP, kctfork — plus the Gradle wrapper (which Dependabot cannot update) are
# deliberately left to the nightly Claude agent (.github/workflows/nightly-dependency-update.yaml).
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Coordinated, build-validated toolchain bumps are owned by the nightly
    # Claude agent. Kotlin / KSP / kotlin-wrappers / allopen must move in lock
    # step (a lone Kotlin bump breaks KSP), and AGP majors need a build to verify.
    ignore:
      - dependency-name: "org.jetbrains.kotlin:*"
      - dependency-name: "org.jetbrains.kotlin.*"
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "org.jetbrains.kotlin-wrappers:*"
      - dependency-name: "com.android.*"
      - dependency-name: "dev.zacsweers.kctfork:*"
    groups:
      gradle-minor-patch:
        # One PR for all non-major bumps to keep noise down; majors stay separate.
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
